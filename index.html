<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akira Rin Store</title>
    <style>
        body {
            background-color: #121212;
            color: #00ff00; /* Warna hijau khas hacker/IT */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .typing-container {
            text-align: center;
            min-height: 150px; /* Menjaga ruang agar layout tidak lompat */
        }

        .typing-text {
            font-size: 2.5rem;
            border-right: 3px solid #00ff00;
            white-space: nowrap;
            overflow: hidden;
            margin: 0 auto;
            letter-spacing: 0.15em;
            width: 0;
            /* Efek kursor berkedip konstan */
            animation: blink-caret 0.75s step-end infinite;
        }

        /* Desain khusus untuk nama toko agar lebih mencolok */
        .store-name {
            color: #ffffff; 
            font-weight: bold;
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #00ff00; }
        }
    </style>
</head>
<body>

    <div class="typing-container">
        <h1 id="animated-text" class="typing-text"></h1>
    </div>

    <script>
        // Daftar kalimat yang akan diketik bergantian (5 bahasa + nama toko)
        const words = [
            "Selamat Datang",     // Indonesia
            "Welcome",            // Inggris
            "いらっしゃいませ",     // Jepang
            "مرحباً",             // Arab
            "환영합니다",          // Korea
            "Akira Rin 明凛 Store" // Nama Toko Anda
        ];

        const textElement = document.getElementById("animated-text");
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        let typingSpeed = 100; // Kecepatan mengetik (milidetik)

        function typeEffect() {
            const currentWord = words[wordIndex];
            
            // Cek apakah ini bagian nama toko terakhir
            if (wordIndex === words.length - 1) {
                textElement.classList.add("store-name");
            } else {
                textElement.classList.remove("store-name");
            }

            if (isDeleting) {
                // Proses menghapus teks
                charIndex--;
                typingSpeed = 50; // Menghapus dibuat lebih cepat
            } else {
                // Proses mengetik teks
                charIndex++;
                typingSpeed = 150; // Mengetik dibuat santai/normal
            }

            // Menampilkan potongan teks ke layar
            textElement.innerHTML = currentWord.substring(0, charIndex);
            
            // Mengatur lebar elemen agar kursor mengikuti teks
            textElement.style.width = charIndex + "ch";

            // Jika kata sudah selesai diketik sepenuhnya
            if (!isDeleting && charIndex === currentWord.length) {
                
                // Jika sudah sampai di kata terakhir (Akira Rin Store), hentikan animasi (tidak usah dihapus lagi)
                if (wordIndex === words.length - 1) {
                    return; 
                }

                typingSpeed = 2000; // Berikan jeda waktu membaca selama 2 detik sebelum dihapus
                isDeleting = true;
            } 
            // Jika kata sudah selesai dihapus total
            else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex++; // Pindah ke bahasa berikutnya
            }

            setTimeout(typeEffect, typingSpeed);
        }

        // Jalankan fungsi animasi saat halaman web dibuka
        window.onload = typeEffect;
    </script>

</body>
</html>
