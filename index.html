<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace Hasan</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .typing-container {
            text-align: center;
        }

        /* Efek Ketik */
        .typing-text {
            font-size: 2rem; /* Sedikit diperkecil agar pas di layar */
            border-right: 3px solid #00ff00; /* Garis kursor warna hijau khas IT */
            white-space: nowrap;
            overflow: hidden;
            margin: 0 auto;
            letter-spacing: 0.15em;
            /* Diubah menjadi 8s (8 detik) agar lebih lambat */
            animation: 
                typing 8s steps(40, end) infinite,
                blink-caret 0.75s step-end infinite;
        }

        /* Animasi mengetik */
        @keyframes typing {
            0% { width: 0 }
            60% { width: 100% }  /* Memberikan jeda waktu saat teks selesai diketik */
            90% { width: 100% }
            100% { width: 0 }
        }

        /* Animasi kursor berkedip */
        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #00ff00; }
        }
    </style>
</head>
<body>

    <div class="typing-container">
        <h1 class="typing-text">Selamat Datang | Welcome | いらっしゃいませ</h1>
        <h1 class="typing-text">Akira Rin | 明凛 Store
    </div>

</body>
</html>
